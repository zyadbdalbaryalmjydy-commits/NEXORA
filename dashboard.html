<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Nexora AI</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
.sidebar{width:220px;height:100vh;background:#020617;position:fixed;padding:20px}
.sidebar button{width:100%;margin-top:10px;padding:10px;background:#1e293b;border:none;color:white}
.main{margin-left:240px;padding:20px}
input{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px}
button.action{padding:10px 15px;background:#6366f1;border:none;border-radius:10px;color:white;margin-top:10px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-top:15px;white-space:pre-wrap}
</style>

</head>

<body>

<div class="sidebar">
<h2>🚀 Nexora</h2>
<button onclick="generate('ideas')">💡 أفكار</button>
<button onclick="generate('names')">🏷️ أسماء</button>
<button onclick="generate('plan')">📋 خطة</button>
<button onclick="generateLogo()">🎨 شعار</button>
<button onclick="loadProjects()">📂 مشاريعي</button>
</div>

<div class="main">

<h2>لوحة Nexora</h2>

<input id="idea" placeholder="اكتب فكرة مشروع...">

<button class="action" onclick="generate('ideas')">توليد</button>

<div id="output" class="card"></div>

<button class="action" onclick="save()">💾 حفظ</button>

<hr>

<h3>💬 شات Nexora</h3>

<div id="chat"></div>

<input id="chatInput" placeholder="اسأل Nexora...">
<button class="action" onclick="sendMessage()">إرسال</button>

</div>

<script>

let lastResult="";

async function generate(type){
const idea=document.getElementById("idea").value;

const res=await fetch("/api/generate",{
method:"POST",
body:JSON.stringify({idea,type})
});

const data=await res.json();
lastResult=data.result;

document.getElementById("output").innerText=data.result;
}

async function generateLogo(){
const idea=document.getElementById("idea").value;

const res=await fetch("/api/logo",{
method:"POST",
body:JSON.stringify({idea})
});

const data=await res.json();

document.getElementById("output").innerHTML=`<img src="${data.url}" width="200">`;
}

async function save(){
await fetch("/api/saveProject",{
method:"POST",
body:JSON.stringify({content:lastResult})
});
alert("تم الحفظ");
}

async function loadProjects(){
const res=await fetch("/api/getProjects");
const data=await res.json();
document.getElementById("output").innerText=
JSON.stringify(data.projects,null,2);
}

async function sendMessage(){

const input=document.getElementById("chatInput");
const msg=input.value;

if(!msg)return;

const chat=document.getElementById("chat");

chat.innerHTML+=`<div style="background:#334155;padding:10px;border-radius:10px;margin:5px">أنت: ${msg}</div>`;

input.value="";

const res=await fetch("/api/chat",{
method:"POST",
body:JSON.stringify({message:msg})
});

const data=await res.json();

chat.innerHTML+=`<div style="background:#1e293b;padding:10px;border-radius:10px;margin:5px">Nexora: ${data.reply}</div>`;
}

</script>

</body>
</html>
