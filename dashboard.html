<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم - Nexora</title>

<style>

body {
font-family: Arial;
background: #0b0f19;
color: white;
text-align: center;
padding: 20px;
}

.container {
max-width: 700px;
margin: auto;
background: #111827;
padding: 20px;
border-radius: 15px;
}

textarea {
width: 95%;
height: 120px;
border-radius: 10px;
padding: 10px;
margin-top: 10px;
}

button {
padding: 10px 20px;
margin: 8px;
border-radius: 10px;
border: none;
background: #2563eb;
color: white;
cursor: pointer;
}

.project {
background: #020617;
margin-top: 10px;
padding: 10px;
border-radius: 10px;
text-align: right;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 لوحة تحكم Nexora</h1>

<p>
هنا يمكنك إنشاء مشاريعك وإدارتها
</p>

<h2>🧠 فكرة مشروع</h2>

<textarea
id="projectIdea"
placeholder="اكتب فكرة مشروعك..."
></textarea>

<br>

<button onclick="saveProject()">
💾 حفظ المشروع
</button>

<button onclick="generatePlan()">
📊 توليد خطة
</button>

<div id="result"></div>

<hr>

<h2>📁 مشاريعك</h2>

<div id="projectsList"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


// Firebase config

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",

authDomain: "nexora-1c66b.firebaseapp.com",

databaseURL:
"https://nexora-1c66b-default-rtdb.firebaseio.com",

projectId: "nexora-1c66b",

storageBucket:
"nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId:
"1:964700323381:web:5826dd261cb062f401fb7c"

};


// تشغيل Firebase

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);


// حفظ مشروع

window.saveProject = function () {

const idea =
document.getElementById(
"projectIdea"
).value;

if (idea === "") {

alert("اكتب فكرة أولاً");

return;

}

push(
ref(db, "projects"),
{
idea: idea
}
);

document.getElementById(
"projectIdea"
).value = "";

};


// عرض المشاريع

const projectsRef =
ref(db, "projects");

onValue(projectsRef, (snapshot) => {

const data =
snapshot.val();

const list =
document.getElementById(
"projectsList"
);

list.innerHTML = "";

for (let id in data) {

const div =
document.createElement("div");

div.className =
"project";

div.innerHTML = `

${data[id].idea}

<br>

<button
onclick="deleteProject('${id}')"
>
🗑 حذف
</button>

`;

list.appendChild(div);

}

});


// حذف مشروع

window.deleteProject =
function (id) {

remove(
ref(db, "projects/" + id)
);

};


// توليد خطة

window.generatePlan =
async function () {

const idea =
document.getElementById(
"projectIdea"
).value;

const resultDiv =
document.getElementById(
"result"
);

resultDiv.innerHTML =
"⏳ جاري التوليد...";

try {

const response =
await fetch(
"/api/generate",
{

method: "POST",

headers: {
"Content-Type":
"application/json"
},

body:
JSON.stringify({
prompt: idea
})

}

);

const data =
await response.json();

resultDiv.innerHTML =
data.result;

}

catch (error) {

resultDiv.innerHTML =
"❌ حدث خطأ";

}

};

</script>

</body>

</html>
