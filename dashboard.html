<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>Nexora Dashboard</title>

<style>

body {

font-family: Arial;
background: #0f172a;
color: white;
text-align: center;

}

.container {

margin-top: 40px;

}

input {

padding: 10px;
width: 260px;
border-radius: 8px;
border: none;

}

button {

padding: 10px 15px;
margin: 5px;
border: none;
border-radius: 8px;
cursor: pointer;

}

.project {

background: #1e293b;
padding: 10px;
margin: 10px;
border-radius: 10px;

}

#logoArea img {

margin-top: 10px;

}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Nexora Dashboard</h1>

<input
id="projectIdea"
placeholder="اكتب فكرة مشروع"
/>

<br><br>

<button onclick="generateName()">

🔥 توليد اسم شركة

</button>

<button onclick="generatePlan()">

📊 توليد خطة

</button>

<button onclick="generateLogo()">

🎨 توليد شعار

</button>

<button onclick="saveProject()">

💾 حفظ المشروع

</button>

<button onclick="launchProject()">

🚀 Launch Project

</button>

<button onclick="goProfile()">

👤 Profile

</button>

<br><br>

<div id="nameResult"></div>

<br>

<div id="planResult"></div>

<br>

<div id="logoArea"></div>

<h2>📁 مشاريعك</h2>

<div id="projectsList"></div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getDatabase,

ref,

push,

onValue,

remove

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "nexora-1c66b.firebaseapp.com",

databaseURL: "https://nexora-1c66b-default-rtdb.firebaseio.com",

projectId: "nexora-1c66b",

storageBucket: "nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId: "1:964700323381:web:5826dd261cb062f401fb7c"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.generateName =
async function () {

const idea =
document.getElementById(
"projectIdea"
).value;

if (idea === "") {

alert("اكتب فكرة");

return;

}

const response =
await fetch(
"/api/name",
{

method: "POST",

headers: {
"Content-Type":
"application/json"
},

body:
JSON.stringify({
prompt: idea
})

}

);

const data =
await response.json();

document.getElementById(
"nameResult"
).innerHTML =

"🏷️ الاسم: " +
data.result;

};

window.generatePlan =
async function () {

const idea =
document.getElementById(
"projectIdea"
).value;

if (idea === "") {

alert("اكتب فكرة");

return;

}

document.getElementById(
"planResult"
).innerHTML =
"⏳ جاري التوليد...";

try {

const response =
await fetch(
"/api/generate",
{

method: "POST",

headers: {
"Content-Type":
"application/json"
},

body:
JSON.stringify({
prompt: idea
})

}

);

const data =
await response.json();

document.getElementById(
"planResult"
).innerHTML =
data.result;

}

catch {

document.getElementById(
"planResult"
).innerHTML =
"❌ خطأ";

}

};

window.generateLogo =
async function () {

const idea =
document.getElementById(
"projectIdea"
).value;

if (idea === "") {

alert("اكتب فكرة");

return;

}

const logoDiv =
document.getElementById(
"logoArea"
);

logoDiv.innerHTML =
"⏳ جاري توليد الشعار...";

try {

const response =
await fetch(
"/api/logo",
{

method: "POST",

headers: {
"Content-Type":
"application/json"
},

body:
JSON.stringify({
name: idea
})

}

);

const data =
await response.json();

logoDiv.innerHTML = `

<img
src="${data.logo}"
width="200"
/>

`;

}

catch {

logoDiv.innerHTML =
"❌ خطأ في الشعار";

}

};

window.saveProject =
function () {

const idea =
document.getElementById(
"projectIdea"
).value;

if (idea === "") {

alert("اكتب فكرة");

return;

}

const logoImage =
document.querySelector(
"#logoArea img"
);

let logoUrl = "";

if (logoImage) {

logoUrl = logoImage.src;

}

push(
ref(db, "projects"),
{

idea: idea,

logo: logoUrl

}

);

alert("تم حفظ المشروع");

};

window.launchProject =
function () {

alert(
"🚀 سيتم إطلاق المشروع قريبًا"
);

};

window.goProfile =
function () {

window.location.href =
"profile.html";

};

window.downloadLogo =
function (url) {

if (!url) {

alert("لا يوجد شعار");

return;

}

const link =
document.createElement("a");

link.href = url;

link.download = "logo.png";

link.click();

};

window.deleteProject =
function (id) {

remove(
ref(db, "projects/" + id)
);

};

const projectsRef =
ref(db, "projects");

onValue(
projectsRef,

(snapshot) => {

const data =
snapshot.val();

const list =
document.getElementById(
"projectsList"
);

list.innerHTML = "";

for (let id in data) {

const div =
document.createElement(
"div"
);

div.className =
"project";

div.innerHTML = `

<b>${data[id].idea}</b>

<br>

${data[id].logo
? `<img src="${data[id].logo}" width="120"><br>`
: ""
}

<button
onclick="downloadLogo('${data[id].logo}')"
>

⬇ تحميل الشعار

</button>

<button
onclick="deleteProject('${id}')"
>

🗑 حذف

</button>

`;

list.appendChild(div);

}

}

);

</script>

</body>

</html>
