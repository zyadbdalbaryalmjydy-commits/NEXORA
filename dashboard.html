<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;}

.main{padding:20px;}

textarea{
width:100%;
height:100px;
border-radius:10px;
border:none;
padding:10px;
}

button{
background:#4c6fff;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.project{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="main">

<h1>🚀 Nexora Dashboard</h1>

<textarea id="idea" placeholder="Write your startup idea..."></textarea>
<br>
<button onclick="createProject()">Generate</button>

<h2>Your Projects</h2>
<div id="projects"></div>

</div>

<script>

function createProject(){

let idea=document.getElementById("idea").value;

if(!idea){
alert("Write idea");
return;
}

// تحقق الاشتراك
let plan = localStorage.getItem("plan") || "free";

if(plan==="free"){
alert("Upgrade to Pro to use AI");
return;
}

// AI توليد
let name="Nexora "+idea.split(" ")[0];

let planText=`
🚀 ${name}

💡 Idea:
${idea}

🎯 Target:
Global users

💰 Business:
Subscription SaaS

📢 Marketing:
TikTok + Ads

🔥 Growth:
Scale globally

💸 Plan:
${plan.toUpperCase()} User
`;

let projects=JSON.parse(localStorage.getItem("projects"))||[];

projects.push({name,planText});

localStorage.setItem("projects",JSON.stringify(projects));

renderProjects();
}

function renderProjects(){

let projects=JSON.parse(localStorage.getItem("projects"))||[];
let div=document.getElementById("projects");

div.innerHTML="";

projects.forEach(p=>{
div.innerHTML+=`
<div class="project">
<h3>${p.name}</h3>
<pre>${p.planText}</pre>
</div>
`;
});
}

renderProjects();

</script>

</body>
</html>
