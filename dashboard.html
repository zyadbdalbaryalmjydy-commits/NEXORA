<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>Nexora Dashboard</title>

<style>

body {

font-family: Arial;

background:#020617;

color:white;

text-align:center;

padding:40px;

}

textarea {

width:80%;

height:120px;

padding:10px;

border-radius:10px;

border:none;

}

button {

padding:12px;

margin:10px;

border:none;

border-radius:10px;

background:#3b82f6;

color:white;

font-size:16px;

cursor:pointer;

}

button:hover {

background:#2563eb;

}

</style>

</head>

<body>

<h1>

🚀 Nexora AI

</h1>

<textarea

id="prompt"

placeholder="اكتب فكرة مشروعك هنا..."

></textarea>

<br>

<button onclick="generatePlan()">

📋 توليد خطة مشروع

</button>

<button onclick="generateNames()">

🧠 توليد أسماء

</button>

<button onclick="generateIdeas()">

💡 توليد أفكار

</button>

<script>

window.generatePlan =
async function() {

const prompt =
document.getElementById("prompt").value;

if (!prompt) {

alert("اكتب فكرة");

return;

}

try {

const res =
await fetch("/api/generate", {

method:"POST",

headers: {

"Content-Type":"application/json"

},

body: JSON.stringify({

prompt: prompt

})

});

const data =
await res.json();

alert(

"📋 خطة المشروع:\n\n" +
data.result

);

}

catch {

alert("خطأ");

}

};

window.generateNames =
async function() {

const prompt =
document.getElementById("prompt").value;

if (!prompt) {

alert("اكتب فكرة");

return;

}

try {

const res =
await fetch("/api/names", {

method:"POST",

headers: {

"Content-Type":"application/json"

},

body: JSON.stringify({

prompt: prompt

})

});

const data =
await res.json();

alert(

"🧠 أسماء مقترحة:\n\n" +
data.names

);

}

catch {

alert("خطأ");

}

};

window.generateIdeas =
async function() {

const prompt =
document.getElementById("prompt").value;

if (!prompt) {

alert("اكتب فكرة");

return;

}

try {

const res =
await fetch("/api/ideas", {

method:"POST",

headers: {

"Content-Type":"application/json"

},

body: JSON.stringify({

prompt: prompt

})

});

const data =
await res.json();

alert(

"💡 أفكار:\n\n" +
data.ideas

);

}

catch {

alert("خطأ");

}

};

</script>

</body>

</html>
