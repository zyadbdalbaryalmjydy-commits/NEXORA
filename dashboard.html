<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Nexora Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h2 {
      margin: 0;
    }

    button {
      background: #6366f1;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .container {
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    .loading {
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <h2>🚀 Nexora Dashboard</h2>
  <button onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">

  <h3>💡 اكتب فكرتك</h3>
  <textarea id="ideaInput" placeholder="مثال: تطبيق توصيل طعام"></textarea>

  <div>
    <button onclick="generate()">🚀 توليد ذكي كامل</button>
    <button onclick="saveProject()">💾 حفظ المشروع</button>
    <button onclick="loadProjects()">📂 عرض مشاريعي</button>
  </div>

  <div id="result" class="card">النتيجة ستظهر هنا...</div>

  <div id="projects" class="card"></div>

</div>

<script>
let currentResult = "";

// 🚀 توليد ذكي (ChatGPT + Gemini)
async function generate() {
  const idea = document.getElementById("ideaInput").value;

  if (!idea) {
    alert("اكتب فكرة أول");
    return;
  }

  const resultBox = document.getElementById("result");
  resultBox.innerText = "⏳ جاري توليد المشروع...";
  resultBox.classList.add("loading");

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ idea })
    });

    const data = await res.json();

    currentResult = data.result || "❌ فشل التوليد";

    resultBox.innerText = currentResult;
    resultBox.classList.remove("loading");

  } catch (err) {
    resultBox.innerText = "❌ خطأ في الاتصال";
    resultBox.classList.remove("loading");
  }
}

// 💾 حفظ المشروع
async function saveProject() {
  if (!currentResult) {
    alert("لا يوجد محتوى للحفظ");
    return;
  }

  try {
    await fetch("/api/saveProject", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content: currentResult
      })
    });

    alert("✅ تم حفظ المشروع");

  } catch {
    alert("❌ فشل الحفظ");
  }
}

// 📂 تحميل المشاريع
async function loadProjects() {
  const container = document.getElementById("projects");
  container.innerHTML = "⏳ جاري التحميل...";

  try {
    const res = await fetch("/api/getProjects");
    const data = await res.json();

    container.innerHTML = "";

    if (!data.projects || data.projects.length === 0) {
      container.innerHTML = "❌ لا توجد مشاريع";
      return;
    }

    data.projects.forEach((p) => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerText = p.content || JSON.stringify(p);
      container.appendChild(div);
    });

  } catch {
    container.innerHTML = "❌ فشل تحميل المشاريع";
  }
}

// 🚪 تسجيل خروج
function logout() {
  localStorage.clear();
  window.location.href = "/";
}
</script>

</body>
</html>
