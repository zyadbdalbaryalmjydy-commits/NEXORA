<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Nexora Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: #6366f1;
      border: none;
      padding: 10px 15px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    .container {
      padding: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>🚀 Nexora Dashboard</h2>
  <button onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">

  <h3>💡 اكتب فكرتك</h3>
  <textarea id="ideaInput" placeholder="مثال: تطبيق توصيل طعام"></textarea>

  <div>
    <button onclick="generate()">⚡ توليد مشروع</button>
    <button onclick="analyzeIdea()">🧠 تحليل متقدم (Gemini)</button>
    <button onclick="saveProject()">💾 حفظ المشروع</button>
    <button onclick="loadProjects()">📂 مشاريعي</button>
  </div>

  <div id="result" class="card">النتيجة تظهر هنا...</div>

  <div id="projects" class="card"></div>

</div>

<script>
let currentResult = "";

// 🔥 توليد المشروع (ChatGPT)
async function generate() {
  const idea = document.getElementById("ideaInput").value;

  if (!idea) {
    alert("اكتب فكرة أول");
    return;
  }

  document.getElementById("result").innerText = "⏳ جاري التوليد...";

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ idea })
  });

  const data = await res.json();

  currentResult = data.result || "❌ فشل التوليد";

  document.getElementById("result").innerText = currentResult;
}

// 🧠 تحليل Gemini
async function analyzeIdea() {
  const idea = document.getElementById("ideaInput").value;

  if (!idea) {
    alert("اكتب فكرة أول");
    return;
  }

  document.getElementById("result").innerText = "🧠 جاري التحليل...";

  const res = await fetch("/api/gemini", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      prompt: `حلل هذه الفكرة وطورها بشكل احترافي:\n${idea}`
    })
  });

  const data = await res.json();

  currentResult = data.result || "❌ فشل التحليل";

  document.getElementById("result").innerText = currentResult;
}

// 💾 حفظ المشروع
async function saveProject() {
  if (!currentResult) {
    alert("ما في نتيجة تحفظها");
    return;
  }

  await fetch("/api/saveProject", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content: currentResult
    })
  });

  alert("✅ تم الحفظ");
}

// 📂 تحميل المشاريع
async function loadProjects() {
  const res = await fetch("/api/getProjects");
  const data = await res.json();

  const container = document.getElementById("projects");

  container.innerHTML = "";

  if (!data.projects || data.projects.length === 0) {
    container.innerHTML = "❌ لا توجد مشاريع";
    return;
  }

  data.projects.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = p.content || JSON.stringify(p);
    container.appendChild(div);
  });
}

// 🚪 تسجيل خروج
function logout() {
  localStorage.clear();
  window.location.href = "/";
}
</script>

</body>
</html>
