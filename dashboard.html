<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px;}
textarea{width:100%;height:100px;padding:10px;}
button{margin:5px;padding:10px;background:#4c6fff;color:white;border:none;border-radius:8px;}
.card{background:#1e293b;padding:15px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<h1>🚀 Nexora Dashboard</h1>

<textarea id="idea" placeholder="Write idea..."></textarea><br>

<button onclick="generateAI()">Generate Plan</button>
<button onclick="generateLogo()">Logo</button>
<button onclick="buildWebsite()">Website</button>

<div id="result"></div>

<h2>Your Projects</h2>
<div id="projects"></div>

<script>

// 🔥 Firebase config
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// 🧠 AI
async function generateAI(){

let idea = document.getElementById("idea").value;

let res = await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({idea})
});

let data = await res.json();

saveProject(idea, data.result);
}

// 🎨 Logo
function generateLogo(){

let idea = document.getElementById("idea").value;

let url = "https://image.pollinations.ai/prompt/" + idea;

saveProject("Logo", `<img src="${url}" width="150">`);
}

// 🌐 Website
function buildWebsite(){

let idea = document.getElementById("idea").value;

let code = `<h1>${idea}</h1><p>Built with Nexora</p>`;

saveProject("Website", `<textarea>${code}</textarea>`);
}

// 💾 حفظ في Firebase
function saveProject(name, content){

let user = firebase.auth().currentUser;

if(!user){
alert("Login first");
return;
}

db.collection("projects").add({
uid:user.uid,
name:name,
content:content
});

loadProjects();
}

// 📂 تحميل المشاريع
function loadProjects(){

let user = firebase.auth().currentUser;

if(!user) return;

db.collection("projects")
.where("uid","==",user.uid)
.get()
.then(snapshot=>{

let div=document.getElementById("projects");
div.innerHTML="";

snapshot.forEach(doc=>{
let p = doc.data();

div.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<div>${p.content}</div>
<button onclick="launchProject('${p.name}')">Launch 🚀</button>
</div>
`;
});

});
}

// 🚀 Launch
function launchProject(name){
alert("Launching " + name + " 🚀");
}

firebase.auth().onAuthStateChanged(user=>{
if(user){
loadProjects();
}
});

</script>

</body>
</html>
