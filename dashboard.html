<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora Dashboard</title>

<style>

body {

font-family: Arial;
direction: rtl;

background: #0f172a;
color: white;

margin: 0;
padding: 20px;

}

.container {

max-width: 800px;
margin: auto;

}

textarea {

width: 100%;
padding: 10px;

border-radius: 10px;

margin-top: 10px;

}

button {

padding: 10px 20px;

margin-top: 10px;

border-radius: 10px;

border: none;

cursor: pointer;

background: #22c55e;

color: white;

}

.project-box {

background: #1e293b;

padding: 15px;

margin-top: 15px;

border-radius: 10px;

}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Nexora Dashboard</h1>

<button onclick="logout()">
🚪 تسجيل خروج
</button>

<textarea
id="prompt"
rows="4"
placeholder="اكتب فكرة مشروعك..."
></textarea>

<button onclick="generatePlan()">
📋 توليد خطة
</button>

<button onclick="loadProjects()">
📂 عرض مشاريعي
</button>

<div id="projects"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",

authDomain: "nexora-1c66b.firebaseapp.com",

projectId: "nexora-1c66b",

storageBucket:
"nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId:
"1:964700323381:web:5826dd261cb062f401fb7c"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);


// تسجيل خروج

window.logout =
async function () {

await signOut(auth);

alert("تم تسجيل الخروج");

window.location.href = "/";

};


// توليد خطة

window.generatePlan =
async function () {

const prompt =
document.getElementById("prompt").value;

const response =
await fetch("/api/generate", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

prompt: prompt

})

});

const data =
await response.json();

await addDoc(
collection(db, "projects"),
{

idea: prompt,

result: data.result,

userId:
auth.currentUser.uid,

createdAt:
new Date()

}

);

alert("✅ تم حفظ المشروع");

};


// عرض المشاريع

window.loadProjects =
async function () {

const projectsDiv =
document.getElementById("projects");

const q = query(
collection(db, "projects"),
where(
"userId",
"==",
auth.currentUser.uid
)
);

const querySnapshot =
await getDocs(q);

let html = "";

querySnapshot.forEach((document) => {

const data =
document.data();

const id =
document.id;

html += `

<div class="project-box">

<h3>📌 الفكرة:</h3>

<p>
${data.idea}
</p>

<h3>🚀 الخطة:</h3>

<pre>
${data.result}
</pre>

<button onclick="deleteProject('${id}')">
🗑️ حذف
</button>

</div>

`;

});

projectsDiv.innerHTML =
html;

};


// حذف مشروع

window.deleteProject =
async function (id) {

await deleteDoc(
doc(db, "projects", id)
);

loadProjects();

};

</script>

</body>

  </html>
