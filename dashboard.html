<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>Nexora Dashboard</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1>🚀 Nexora AI</h1>

<textarea
id="prompt"
placeholder="اكتب فكرة مشروعك..."
></textarea>

<div class="buttons">

<button onclick="generatePlan()">

📋 خطة مشروع

</button>

<button onclick="generateNames()">

🧠 أسماء

</button>

<button onclick="generateIdeas()">

💡 أفكار

</button>

<button onclick="generateLogo()">

🎨 Logo

</button>

<button onclick="saveProject()">

💾 حفظ

</button>

<button onclick="goProjects()">

📂 المشاريع

</button>

</div>

<script>

async function generatePlan(){

const prompt =
document.getElementById("prompt").value;

const res =
await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({prompt})

});

const data =
await res.json();

alert(data.result);

}

async function generateNames(){

const prompt =
document.getElementById("prompt").value;

const res =
await fetch("/api/names",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({prompt})

});

const data =
await res.json();

alert(data.names);

}

async function generateIdeas(){

const prompt =
document.getElementById("prompt").value;

const res =
await fetch("/api/ideas",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({prompt})

});

const data =
await res.json();

alert(data.ideas);

}

async function generateLogo(){

const prompt =
document.getElementById("prompt").value;

const res =
await fetch("/api/logo",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({prompt})

});

const data =
await res.json();

alert(data.logo);

}

async function saveProject(){

const prompt =
document.getElementById("prompt").value;

await fetch("/api/saveProject",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

project: prompt

})

});

alert("تم حفظ المشروع");

}

function goProjects(){

window.location.href =
"projects.html";

}

</script>

</body>

</html>
