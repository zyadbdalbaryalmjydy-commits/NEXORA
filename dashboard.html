<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>Nexora Dashboard</title>

<style>

body {

font-family: Arial;

background: #020617;

color: white;

text-align: center;

padding: 20px;

}

textarea {

width: 90%;

height: 140px;

border-radius: 10px;

padding: 10px;

}

button {

padding: 12px 20px;

border-radius: 10px;

margin: 8px;

cursor: pointer;

}

.project {

background: #0f172a;

padding: 12px;

margin: 10px;

border-radius: 12px;

}

</style>

</head>

<body>

<h1>🚀 Nexora Dashboard</h1>

<p>

🔥 اشتراك Pro مفعل مجانًا مؤقت

</p>



<textarea
id="idea"
placeholder="اكتب فكرة مشروعك هنا...">
</textarea>

<br>



<button id="generatePlanBtn">
📊 توليد خطة مشروع
</button>

<button id="generateLogoBtn">
🎨 توليد شعار
</button>

<button id="buildWebsiteBtn">
🌐 Build Website AI
</button>

<button id="saveBtn">
💾 حفظ المشروع
</button>



<h2>📁 المشاريع المحفوظة</h2>

<div id="projects"></div>



<script type="module">

import {

db,
collection,
addDoc,
getDocs

}
from
"./firebase.js";



// توليد خطة

document

.getElementById("generatePlanBtn")

.addEventListener("click",

async () => {

const idea =
document.getElementById("idea").value;

const response =
await fetch("/api/generate", {

method: "POST",

headers: {

"Content-Type":
"application/json"

},

body:

JSON.stringify({

prompt: idea,
type: "plan"

})

});

const data =
await response.json();

document.getElementById("idea").value =
data.result;

});



// توليد شعار

document

.getElementById("generateLogoBtn")

.addEventListener("click",

async () => {

const idea =
document.getElementById("idea").value;

const response =
await fetch("/api/generate", {

method: "POST",

headers: {

"Content-Type":
"application/json"

},

body:

JSON.stringify({

prompt: idea,
type: "logo"

})

});

const data =
await response.json();

alert(data.result);

});



// Build Website

document

.getElementById("buildWebsiteBtn")

.addEventListener("click",

async () => {

const idea =
document.getElementById("idea").value;

const response =
await fetch("/api/generate", {

method: "POST",

headers: {

"Content-Type":
"application/json"

},

body:

JSON.stringify({

prompt: idea,
type: "website"

})

});

const data =
await response.json();

alert(data.result);

});



// حفظ مشروع

document

.getElementById("saveBtn")

.addEventListener("click",

async () => {

const content =
document.getElementById("idea").value;

await addDoc(

collection(db, "projects"),

{

content: content,
date: new Date()

}

);

alert("✅ تم حفظ المشروع");

loadProjects();

});



// تحميل المشاريع

async function loadProjects() {

const querySnapshot =
await getDocs(

collection(db, "projects")

);

const container =
document.getElementById("projects");

container.innerHTML = "";

querySnapshot.forEach((doc) => {

const div =
document.createElement("div");

div.className = "project";

div.innerHTML = `

📄 ${doc.data().content}

<br>

<button onclick="launchProject()">
🚀 Launch Project
</button>

`;

container.appendChild(div);

});

}



// Launch

window.launchProject =
function () {

alert("🚀 سيتم إطلاق المشروع قريبًا");

};



// تحميل عند الفتح

loadProjects();

</script>

</body>

</html>
