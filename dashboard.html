<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>Nexora Dashboard</title>

<style>

body {
font-family: Arial;
background: #0b0f19;
color: white;
text-align: center;
padding: 20px;
}

textarea {
width: 90%;
height: 120px;
border-radius: 10px;
padding: 10px;
}

button {
padding: 10px 20px;
margin: 8px;
border-radius: 10px;
background: #2563eb;
color: white;
border: none;
}

.project {
background: #111827;
padding: 10px;
margin: 10px;
border-radius: 10px;
}

</style>

</head>

<body>

<h1>🚀 Nexora Dashboard</h1>

<textarea
id="idea"
placeholder="اكتب فكرة مشروعك..."
></textarea>

<br>

<button onclick="saveProject()">
💾 حفظ المشروع
</button>

<h2>📁 المشاريع</h2>

<div id="projects"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// Firebase config

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",

authDomain: "nexora-1c66b.firebaseapp.com",

projectId: "nexora-1c66b",

storageBucket: "nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId: "1:964700323381:web:5826dd261cb062f401fb7c"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// حفظ مشروع

window.saveProject = async function () {

const idea =
document.getElementById("idea").value;

await addDoc(
collection(db, "projects"),
{
idea: idea
}
);

alert("✅ تم حفظ المشروع");

loadProjects();

};


// تحميل المشاريع

async function loadProjects() {

const querySnapshot =
await getDocs(
collection(db, "projects")
);

const container =
document.getElementById("projects");

container.innerHTML = "";

querySnapshot.forEach((doc) => {

const div =
document.createElement("div");

div.className = "project";

div.innerHTML =
doc.data().idea;

container.appendChild(div);

});

}


loadProjects();

</script>

</body>

</html>
