<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Nexora Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#020617,#0f172a);
      color: white;
    }

    header {
      padding: 15px 20px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    h2 {
      margin: 0;
    }

    button {
      background: #6366f1;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin: 5px;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      font-size: 14px;
    }

    .actions {
      margin-top: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    .loading {
      opacity: 0.6;
    }

    img {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>🚀 Nexora</h2>
  <button onclick="logout()">تسجيل خروج</button>
</header>

<div class="container">

  <h3>💡 اكتب فكرتك</h3>
  <textarea id="ideaInput" placeholder="مثال: تطبيق توصيل طعام"></textarea>

  <div class="actions">
    <button onclick="generate()">🚀 توليد ذكي</button>
    <button onclick="generateLogo()">🎨 توليد لوجو</button>
    <button onclick="saveProject()">💾 حفظ</button>
    <button onclick="loadProjects()">📂 مشاريعي</button>
  </div>

  <div id="result" class="card">النتيجة ستظهر هنا...</div>
  <div id="projects" class="card"></div>

</div>

<script>
let currentResult = "";

// 🚀 Hybrid AI
async function generate() {
  const idea = document.getElementById("ideaInput").value;

  if (!idea) {
    alert("اكتب فكرة أول");
    return;
  }

  const box = document.getElementById("result");
  box.innerText = "⏳ جاري التوليد...";
  box.classList.add("loading");

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ idea })
    });

    const data = await res.json();

    currentResult = data.result || "❌ فشل";

    box.innerText = currentResult;
    box.classList.remove("loading");

  } catch {
    box.innerText = "❌ خطأ اتصال";
    box.classList.remove("loading");
  }
}

// 🎨 Logo
async function generateLogo() {
  const idea = document.getElementById("ideaInput").value;

  if (!idea) {
    alert("اكتب اسم المشروع");
    return;
  }

  const res = await fetch("/api/logo", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name: idea })
  });

  const data = await res.json();

  document.getElementById("result").innerHTML =
    `<img src="${data.logo}" width="200" style="border-radius:10px;">`;
}

// 💾 Save
async function saveProject() {
  if (!currentResult) {
    alert("لا يوجد شيء للحفظ");
    return;
  }

  await fetch("/api/saveProject", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      content: currentResult
    })
  });

  alert("✅ تم الحفظ");
}

// 📂 Load
async function loadProjects() {
  const container = document.getElementById("projects");
  container.innerHTML = "⏳...";

  const res = await fetch("/api/getProjects");
  const data = await res.json();

  container.innerHTML = "";

  if (!data.projects || data.projects.length === 0) {
    container.innerHTML = "❌ لا يوجد مشاريع";
    return;
  }

  data.projects.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = p.content;
    container.appendChild(div);
  });
}

// 🚪 Logout
function logout() {
  localStorage.clear();
  window.location.href = "/";
}
</script>

</body>
</html>
