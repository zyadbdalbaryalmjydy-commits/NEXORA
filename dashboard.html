<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;}

.main{padding:20px;}

textarea{
width:100%;
height:100px;
border-radius:10px;
border:none;
padding:10px;
}

button{
background:#4c6fff;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin:5px;
}

.project{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="main">

<h1>🚀 Nexora Dashboard</h1>

<textarea id="idea" placeholder="Write your startup idea..."></textarea>
<br>

<button onclick="createProject()">Generate Plan</button>
<button onclick="generatePitch()">Generate Pitch</button>
<button onclick="generateLogo()">Generate Logo</button>

<h2>Your Projects</h2>
<div id="projects"></div>

</div>

<script>

function getPlan(){
return localStorage.getItem("plan") || "free";
}

function checkAccess(){
if(getPlan()==="free"){
alert("Upgrade to Pro");
return false;
}
return true;
}

// 🧠 خطة مشروع
async function createProject(){

let idea=document.getElementById("idea").value;

if(!idea){
alert("Write idea");
return;
}

if(!checkAccess()) return;

// AI بسيط
let text = `
🚀 Startup: ${idea}

💡 Idea:
${idea}

🎯 Target:
Global users

💰 Business:
Subscription SaaS

📢 Marketing:
TikTok + Ads

📈 Growth:
Scale globally fast
`;

saveProject(idea, text);
}

// 🎤 Pitch Deck
async function generatePitch(){

let idea=document.getElementById("idea").value;

if(!idea){
alert("Write idea");
return;
}

if(!checkAccess()) return;

let text = `
🎤 Pitch Deck

Startup: ${idea}

Problem:
Users struggle to build startups

Solution:
Nexora AI solves it instantly

Market:
Global SaaS market

Revenue:
Subscriptions

Vision:
Build billion-dollar company
`;

saveProject("Pitch - " + idea, text);
}

// 🎨 Logo
function generateLogo(){

let idea=document.getElementById("idea").value;

if(!idea){
alert("Write idea");
return;
}

let url = "https://image.pollinations.ai/prompt/" + encodeURIComponent("logo for " + idea);

saveProject("Logo - " + idea, `<img src="${url}" width="200">`);
}

// حفظ
function saveProject(name, content){

let projects=JSON.parse(localStorage.getItem("projects"))||[];

projects.push({
name:name,
content:content
});

localStorage.setItem("projects",JSON.stringify(projects));

renderProjects();
}

// عرض
function renderProjects(){

let projects=JSON.parse(localStorage.getItem("projects"))||[];
let div=document.getElementById("projects");

div.innerHTML="";

projects.forEach(p=>{
div.innerHTML+=`
<div class="project">
<h3>${p.name}</h3>
<div>${p.content}</div>
</div>
`;
});
}

renderProjects();

</script>

</body>
</html>
