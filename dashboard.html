<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>Nexora Dashboard</title>

<style>

body {
font-family: Arial;
background: #0f172a;
color: white;
text-align: center;
padding: 20px;
}

textarea {
width: 90%;
height: 120px;
border-radius: 10px;
padding: 10px;
}

button {
padding: 12px 20px;
border-radius: 10px;
margin: 10px;
cursor: pointer;
font-size: 16px;
}

.project {
background: #1e293b;
padding: 10px;
margin: 10px;
border-radius: 10px;
}

</style>

</head>

<body>

<h1>🚀 Nexora Dashboard</h1>

<p>🔥 اشتراك Pro مفعل مجانًا مؤقت</p>


<!-- مربع الفكرة -->

<textarea id="idea"
placeholder="اكتب فكرة مشروعك هنا...">
</textarea>

<br>


<!-- الأزرار -->

<button id="generateBtn">
📊 توليد خطة مشروع
</button>

<button id="saveBtn">
💾 حفظ المشروع
</button>


<h2>📁 المشاريع المحفوظة</h2>

<div id="projects"></div>


<script type="module">

import {
db,
collection,
addDoc,
getDocs
} from "./firebase.js";



// توليد خطة

document.getElementById("generateBtn")
.addEventListener("click", async () => {

const idea =
document.getElementById("idea").value;

if (!idea) {

alert("اكتب فكرة أولاً");
return;

}

const response =
await fetch("/api/generate", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
prompt: idea
})

});

const data =
await response.json();

document.getElementById("idea").value =
data.result;

});



// حفظ مشروع

document.getElementById("saveBtn")
.addEventListener("click", async () => {

const content =
document.getElementById("idea").value;

if (!content) {

alert("لا يوجد مشروع");
return;

}

await addDoc(
collection(db, "projects"),
{
content: content,
date: new Date()
}
);

alert("✅ تم حفظ المشروع");

loadProjects();

});



// تحميل المشاريع

async function loadProjects() {

const querySnapshot =
await getDocs(
collection(db, "projects")
);

const container =
document.getElementById("projects");

container.innerHTML = "";

querySnapshot.forEach((doc) => {

const div =
document.createElement("div");

div.className = "project";

div.innerHTML = `
📄 ${doc.data().content}
<br>
<button onclick="launchProject()">
🚀 Launch Project
</button>
`;

container.appendChild(div);

});

}



// Launch

window.launchProject =
function() {

alert("🚀 سيتم إطلاق المشروع قريبًا");

}



// تحميل المشاريع عند الفتح

loadProjects();

</script>

</body>

</html>
