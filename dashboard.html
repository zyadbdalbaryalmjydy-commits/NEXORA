<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* Sidebar */
.sidebar{
  width:220px;
  height:100vh;
  background:#020617;
  position:fixed;
  padding:20px;
}

.sidebar h2{
  color:#4c6fff;
}

.sidebar a{
  display:block;
  margin:15px 0;
  color:white;
  text-decoration:none;
}

/* Main */
.main{
  margin-left:240px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  margin:15px 0;
}

textarea{
  width:100%;
  height:100px;
  border-radius:10px;
  border:none;
  padding:10px;
}

button{
  background:#4c6fff;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.project{
  background:#0f172a;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>

</head>
<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <a href="#">Dashboard</a>
  <a href="#">Projects</a>
  <a href="#">Settings</a>
</div>

<div class="main">

<h1>🚀 Dashboard</h1>

<div class="card">
<h3>Create New Startup</h3>
<textarea id="idea" placeholder="Write your idea..."></textarea>
<br>
<button onclick="createProject()">Generate</button>
</div>

<div class="card">
<h3>Your Projects</h3>
<div id="projects"></div>
</div>

</div>

<script>

// تخزين المشاريع
let projects = JSON.parse(localStorage.getItem("projects")) || [];

function saveProjects(){
  localStorage.setItem("projects", JSON.stringify(projects));
}

function createProject(){

let idea = document.getElementById("idea").value;

if(!idea){
  alert("Write idea first");
  return;
}

// توليد اسم
let name = "Nexora " + idea.split(" ")[0];

// تقييم
let score = Math.floor(Math.random()*30)+70;

// مشروع
let project = {
  name,
  idea,
  score
};

projects.push(project);
saveProjects();
renderProjects();

document.getElementById("idea").value = "";
}

function renderProjects(){

let container = document.getElementById("projects");
container.innerHTML = "";

projects.forEach(p => {
  container.innerHTML += `
    <div class="project">
      <h4>${p.name}</h4>
      <p>${p.idea}</p>
      <p>Score: ${p.score}/100</p>
    </div>
  `;
});

}

// تحميل المشاريع عند فتح الصفحة
renderProjects();

</script>

</body>
</html>
