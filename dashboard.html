<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="styles.css">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",
authDomain: "nexora-1c66b.firebaseapp.com",
projectId: "nexora-1c66b",

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

let currentUser = null;

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser = user;
loadProjects();

}

else{

window.location.href="index.html";

}

});

window.generatePlan = async function(){

const prompt =
document.getElementById("prompt").value;

const res =
await fetch("/api/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({prompt})

});

const data =
await res.json();

document.getElementById("result")
innerText = data.result;

}

window.saveProject = async function(){

const prompt =
document.getElementById("prompt").value;

await fetch("/api/saveProject",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

project: prompt,
userId: currentUser.uid

})

});

loadProjects();

}

async function loadProjects(){

const res =
await fetch("/api/getProjects");

const data =
await res.json();

const list =
document.getElementById("projects");

list.innerHTML="";

data.projects.forEach(p=>{

const div =
document.createElement("div");

div.className="project";

div.innerHTML=`

${p.project}

<button onclick="deleteProject('${p.project}')">
❌
</button>

`;

list.appendChild(div);

});

}

window.deleteProject =
async function(project){

await fetch("/api/deleteProject",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({

project

})

});

loadProjects();

}

</script>

</head>

<body>

<div class="container">

<h2>لوحة التحكم 🚀</h2>

<input id="prompt"
placeholder="اكتب فكرة مشروع...">

<button onclick="generatePlan()">
توليد خطة
</button>

<button onclick="saveProject()">
💾 حفظ
</button>

<div id="result"></div>

<h3>مشاريعي</h3>

<div id="projects"></div>

</div>

</body>
</html>
