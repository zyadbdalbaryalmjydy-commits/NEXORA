<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
</head>
<body>

<h2>Nexora Dashboard</h2>

<input id="idea" placeholder="اكتب فكرة مشروع">
<button onclick="generate()">توليد</button>

<pre id="result"></pre>

<button onclick="save()">💾 حفظ</button>
<button onclick="load()">📂 مشاريعي</button>

<script>
async function generate(){
  let idea=document.getElementById("idea").value;

  let res=await fetch("/api/generate",{
    method:"POST",
    body:JSON.stringify({idea})
  });

  let data=await res.json();
  document.getElementById("result").innerText=data.result;
}

async function save(){
  let content=document.getElementById("result").innerText;

  await fetch("/api/saveProject",{
    method:"POST",
    body:JSON.stringify({content})
  });

  alert("تم الحفظ");
}

async function load(){
  let res=await fetch("/api/getProjects");
  let data=await res.json();
  document.getElementById("result").innerText=
    JSON.stringify(data.projects,null,2);
}
</script>

</body>
</html>
