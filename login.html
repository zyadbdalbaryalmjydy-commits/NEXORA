<!DOCTYPE html>
<html>
<body style="text-align:center;background:#0f172a;color:white;padding-top:100px;">

<h1>Login</h1>

<input id="email" placeholder="Email"><br><br>
<input id="pass" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>
function login(){

let user=JSON.parse(localStorage.getItem("user"));

if(!user){
alert("No account");
return;
}

if(email.value===user.email && pass.value===user.password){
window.location.href="dashboard.html";
}else{
alert("Wrong info");
}
}
</script>

</body>
</html>
