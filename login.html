<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول - Nexora</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
<h1>تسجيل الدخول</h1>
<input id="email" type="email" placeholder="البريد الإلكتروني"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>
<button onclick="login()">دخول</button>

<script>
const firebaseConfig={apiKey:"YOUR_FIREBASE_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",databaseURL:"https://YOUR_PROJECT.firebaseio.com",projectId:"YOUR_PROJECT"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
function login(){
  let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;
  auth.signInWithEmailAndPassword(email,password)
  .then(user=>window.location.href="dashboard.html")
  .catch(err=>alert(err.message));
}
</script>
</body>
</html>
