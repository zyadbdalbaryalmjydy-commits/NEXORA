<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>Nexora Login</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="login-box">

<h1>🚀 Nexora</h1>

<input id="email" placeholder="Email">

<input
id="password"
type="password"
placeholder="Password"
>

<button onclick="login()">

تسجيل دخول

</button>

<button onclick="register()">

إنشاء حساب

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "YOUR_FIREBASE_KEY",

authDomain: "nexora-1c66b.firebaseapp.com",

projectId: "nexora-1c66b",

storageBucket: "nexora-1c66b.appspot.com",

messagingSenderId: "964700323381",

appId: "1:964700323381:web:5826dd261cb062f401fb7c"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await signInWithEmailAndPassword(
auth,email,password
);

window.location.href =
"dashboard.html";

};

window.register = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await createUserWithEmailAndPassword(
auth,email,password
);

alert("تم إنشاء الحساب");

};

</script>

</body>

</html>
