<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>Nexora AI</title>

<style>

body {

font-family: Arial;

background: #020617;

color: white;

text-align: center;

padding: 30px;

}

button {

padding: 14px 24px;

border-radius: 12px;

border: none;

font-size: 16px;

margin: 10px;

cursor: pointer;

}

input {

padding: 10px;

border-radius: 10px;

margin: 5px;

}

.card {

background: #0f172a;

padding: 20px;

border-radius: 15px;

display: inline-block;

}

</style>

</head>

<body>

<h1>🚀 Nexora AI</h1>

<p>

🔥 اشتراك Pro مجاني مؤقت  
حتى يتم إطلاق المنصة رسميًا

</p>


<div class="card">

<h2>🔐 تسجيل الدخول</h2>

<input id="email"
type="email"
placeholder="البريد الإلكتروني">

<br>

<input id="password"
type="password"
placeholder="كلمة المرور">

<br>

<button id="loginBtn">

تسجيل دخول

</button>

<button id="registerBtn">

إنشاء حساب

</button>

</div>


<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword,

createUserWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";



// Firebase Config

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",

authDomain: "nexora-1c66b.firebaseapp.com",

projectId: "nexora-1c66b",

storageBucket: "nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId: "1:964700323381:web:5826dd261cb062f401fb7c"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



// تسجيل دخول

document

.getElementById("loginBtn")

.addEventListener("click",

async () => {

const email =

document.getElementById("email").value;

const password =

document.getElementById("password").value;

try {

await signInWithEmailAndPassword(

auth,

email,

password

);

window.location.href =

"/dashboard.html";

}

catch (error) {

alert(error.message);

}

});



// إنشاء حساب

document

.getElementById("registerBtn")

.addEventListener("click",

async () => {

const email =

document.getElementById("email").value;

const password =

document.getElementById("password").value;

try {

await createUserWithEmailAndPassword(

auth,

email,

password

);

alert("✅ تم إنشاء الحساب");

}

catch (error) {

alert(error.message);

}

});

</script>
<script type="module" src="firebase.js"></script>
</body>

</html>
