<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora</title>

<style>

body {

font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color: white;
text-align: center;
padding: 40px;

}

h1 {

font-size: 40px;

}

button {

background: linear-gradient(45deg,#3a7bd5,#00d2ff);
border: none;
padding: 15px 25px;
margin: 10px;
font-size: 18px;
border-radius: 12px;
color: white;
cursor: pointer;

}

input {

padding: 12px;
width: 80%;
max-width: 400px;
border-radius: 10px;
border: none;
margin-top: 20px;

}

#result {

margin-top: 30px;
background: rgba(255,255,255,0.1);
padding: 20px;
border-radius: 12px;
white-space: pre-line;

}

</style>

</head>

<body>

<h1>🚀 Nexora</h1>

<p>منصة بناء المشاريع بالذكاء الاصطناعي</p>


<!-- مربع الفكرة -->

<input
id="ideaInput"
placeholder="اكتب فكرة مشروعك هنا..."
>


<br><br>

<!-- الأزرار -->

<button id="generatePlan">
📊 توليد خطة مشروع
</button>

<button id="generateLogo">
🎨 توليد شعار
</button>


<!-- النتيجة -->

<div id="result">

هنا ستظهر خطة المشروع...

</div>


<!-- ربط الجافاسكربت -->

<script type="module" src="app.js"></script>

</body>

</html>
