<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#0f172a,#1e3a8a);
  color:white;
  text-align:center;
}

header{
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.hero{
  margin-top:80px;
}

button{
  background:#4c6fff;
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}

.section{
  margin-top:80px;
}

.pricing{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:250px;
}
</style>

</head>
<body>

<header>NEXORA 🚀</header>

<div class="hero">
  <h1>Build Your Startup with AI</h1>
  <p>Create full business ideas, plans and logos in seconds</p>

  <button onclick="start()">Start Building</button>
</div>

<div class="section">
  <h2>🔥 Features</h2>
  <p>AI Startup Generator</p>
  <p>Business Plans</p>
  <p>Startup Score</p>
  <p>AI Logo Generator</p>
</div>

<div class="section">
  <h2>💰 Pricing</h2>

  <div class="pricing">

    <div class="card">
      <h3>Free</h3>
      <p>$0</p>
      <p>Limited access</p>
    </div>

    <div class="card">
      <h3>Pro</h3>
      <p>$12/month</p>
      <p>11 months + 1 free</p>
    </div>

    <div class="card">
      <h3>Ultra</h3>
      <p>$31/month</p>
      <p>All features</p>
    </div>

  </div>
</div>

<script>
function start(){

let user = localStorage.getItem("user");

if(user){
  window.location.href = "dashboard.html";
}else{
  window.location.href = "signup.html";
}

}
</script>

</body>
</html>
