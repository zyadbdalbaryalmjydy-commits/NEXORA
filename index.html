<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Nexora AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#020617,#0f172a);
      color: white;
      text-align: center;
    }

    .hero {
      padding: 80px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
    }

    button {
      background: #6366f1;
      border: none;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .features {
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🚀 Nexora</h1>
  <p>حوّل فكرتك إلى مشروع كامل خلال دقائق باستخدام الذكاء الاصطناعي</p>

  <button onclick="go()">ابدأ الآن</button>
</div>

<div class="features">
  <div class="card">💡 توليد أفكار</div>
  <div class="card">📋 خطة مشروع</div>
  <div class="card">🧠 تحليل ذكي</div>
  <div class="card">🎨 لوجو احترافي</div>
</div>

<script>
function go() {
  window.location.href = "/dashboard.html";
}
</script>

</body>
</html>
