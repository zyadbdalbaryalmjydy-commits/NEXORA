<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #0b1d3a, #3a6cf4);
  color: white;
  text-align: center;
}

.container {
  margin-top: 100px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background: white;
  color: black;
  cursor: pointer;
  margin-top: 10px;
}

#app {
  display: none;
}
</style>
</head>

<body>

<div class="container" id="auth">
  <h1>🚀 Nexora</h1>
  <h2>إنشاء حساب / تسجيل دخول</h2>

  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="signup()">إنشاء حساب</button>
  <button onclick="login()">تسجيل دخول</button>
</div>

<div class="container" id="app">
  <h1>🎉 مرحبًا بك في Nexora</h1>
  <p id="userEmail"></p>

  <textarea id="idea" placeholder="اكتب فكرتك..." style="width:300px;height:100px;"></textarea>
  <br>
  <button onclick="generate()">🚀 توليد خطة</button>

  <pre id="result"></pre>

  <button onclick="logout()">تسجيل خروج</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// 🔥 حط بيانات Firebase هنا
const firebaseConfig = {
  // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",
  authDomain: "nexora-1c66b.firebaseapp.com",
  projectId: "nexora-1c66b",
  storageBucket: "nexora-1c66b.firebasestorage.app",
  messagingSenderId: "964700323381",
  appId: "1:964700323381:web:5826dd261cb062f401fb7c",
  measurementId: "G-HVC60XSN6D"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

// تشغيل Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// تسجيل
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("تم إنشاء الحساب 🚀"))
    .catch(err => alert(err.message));
}

// تسجيل دخول
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("تم تسجيل الدخول ✅"))
    .catch(err => alert(err.message));
}

// تسجيل خروج
function logout() {
  auth.signOut();
}

// مراقبة الحالة
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("userEmail").innerText = user.email;
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

// AI وهمي مؤقت
function generate() {
  const idea = document.getElementById("idea").value;

  document.getElementById("result").innerText = `
🚀 خطة مشروع:

💡 الفكرة:
${idea}

📊 السوق:
سوق كبير وقابل للنمو

💰 الربح:
اشتراكات شهرية

📈 التوسع:
إضافة ميزات AI متقدمة

🔥 نصيحة:
ابدأ بـ MVP واطلق بسرعة
  `;
}
</script>

</body>
  </html>
