<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora</title>

<style>

body {

font-family: Arial;
direction: rtl;
text-align: center;

background: #0f172a;
color: white;

margin: 0;
padding: 20px;

}

.container {

max-width: 700px;
margin: auto;

}

input, textarea {

width: 100%;
padding: 10px;

margin: 10px 0;

border-radius: 10px;
border: none;

}

button {

padding: 10px 20px;
margin: 5px;

border-radius: 10px;
border: none;

cursor: pointer;

background: #22c55e;
color: white;

font-size: 16px;

}

#result,
#projects {

margin-top: 20px;

background: #1e293b;

padding: 15px;

border-radius: 10px;

white-space: pre-wrap;

}

.project-box {

border: 1px solid #334155;

padding: 10px;

margin: 10px 0;

border-radius: 10px;

}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Nexora</h1>

<p>
منصة إنشاء المشاريع بالذكاء الاصطناعي
</p>

<input
id="email"
type="email"
placeholder="البريد الإلكتروني"
/>

<input
id="password"
type="password"
placeholder="كلمة المرور"
/>

<button onclick="register()">
🆕 إنشاء حساب
</button>

<button onclick="login()">
🔑 تسجيل دخول
</button>

<hr>

<textarea
id="prompt"
rows="4"
placeholder="اكتب فكرة مشروعك هنا..."
></textarea>

<button onclick="generatePlan()">
📋 توليد خطة
</button>

<button onclick="loadProjects()">
📂 عرض مشاريعي
</button>

<div id="result"></div>

<div id="projects"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",

authDomain: "nexora-1c66b.firebaseapp.com",

databaseURL:
"https://nexora-1c66b-default-rtdb.firebaseio.com",

projectId: "nexora-1c66b",

storageBucket:
"nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId:
"1:964700323381:web:5826dd261cb062f401fb7c",

measurementId: "G-HVC60XSN6D"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);


// إنشاء حساب

window.register =
async function () {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("✅ تم إنشاء الحساب");

}

catch (error) {

alert(error.message);

}

};


// تسجيل دخول

window.login =
async function () {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("✅ تم تسجيل الدخول");

}

catch (error) {

alert(error.message);

}

};


// توليد خطة

window.generatePlan =
async function () {

const prompt =
document.getElementById("prompt").value;

const resultDiv =
document.getElementById("result");

resultDiv.innerHTML =
"⏳ جاري توليد الخطة...";

try {

const response =
await fetch("/api/generate", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

prompt: prompt,
type: "plan"

})

});

const data =
await response.json();

resultDiv.innerHTML =
data.result;


// حفظ المشروع

await addDoc(
collection(db, "projects"),
{

idea: prompt,

result: data.result,

createdAt:
new Date()

}

);

}

catch (error) {

resultDiv.innerHTML =
"❌ حدث خطأ أثناء توليد الخطة";

}

};


// عرض المشاريع

window.loadProjects =
async function () {

const projectsDiv =
document.getElementById("projects");

projectsDiv.innerHTML =
"⏳ جاري تحميل المشاريع...";

try {

const querySnapshot =
await getDocs(
collection(db, "projects")
);

let html = "";

querySnapshot.forEach((doc) => {

const data = doc.data();

html += `

<div class="project-box">

<h3>📌 الفكرة:</h3>

<p>
${data.idea}
</p>

<h3>🚀 الخطة:</h3>

<pre>
${data.result}
</pre>

</div>

`;

});

projectsDiv.innerHTML =
html;

}

catch (error) {

projectsDiv.innerHTML =
"❌ حدث خطأ أثناء تحميل المشاريع";

}

};

</script>

</body>

</html>
