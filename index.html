<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Nexora AI</title>
<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background: linear-gradient(180deg,#0b1026,#1f3fff);
  color:white;
  text-align:center;
}
header{
  padding:20px;
  background:#0f1738;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header a{
  color:white;
  margin-left:15px;
  text-decoration:none;
  font-weight:bold;
}
.logo{
  font-size:28px;
  font-weight:bold;
}
.hero{
  padding:80px 20px;
}
textarea{
  width:60%;
  height:120px;
  border-radius:10px;
  padding:10px;
  margin-top:20px;
  border:none;
  font-size:16px;
}
button{
  background:#3f6cff;
  color:white;
  border:none;
  padding:12px 30px;
  border-radius:8px;
  margin-top:15px;
  cursor:pointer;
  font-size:16px;
}
#result{
  white-space:pre-line;
  margin-top:30px;
  padding:20px;
  text-align:left;
  background:#121a40;
  border-radius:10px;
}
nav{
  display:flex;
  align-items:center;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<header>
  <div class="logo">NEXORA AI</div>
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="signup.html">تسجيل</a>
    <a href="login.html">دخول</a>
    <a href="dashboard.html">لوحة التحكم</a>
  </nav>
</header>

<section class="hero">
<h1>ابدأ شركتك بالذكاء الاصطناعي</h1>
<p>اكتب فكرة مشروعك وسيقوم Nexora بإنشاء خطة كاملة</p>

<textarea id="idea" placeholder="اكتب فكرة مشروعك هنا"></textarea><br>
<button onclick="generatePlan()">إنشاء الخطة</button>

<pre id="result"></pre>
</section>

<script>
async function generatePlan(){
  let idea=document.getElementById("idea").value.trim();
  if(!idea){alert("اكتب فكرة مشروعك أولاً");return;}

  document.getElementById("result").innerText="...جاري توليد الخطة بالذكاء الاصطناعي";

  try{
    const response=await axios.post("https://api.openai.com/v1/chat/completions",{
      model:"gpt-4",
      messages:[{role:"user", content:`اعطني خطة مشروع شاملة وفعلية لفكرة: ${idea}. اجعلها تشمل اسم المشروع، الجمهور المستهدف، نموذج الربح، خطة بناء المشروع، خطة التسويق، أول 100 مستخدم، وخطة التوسع.`}],
      max_tokens:1200
    },{
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer YOUR_OPENAI_API_KEY"
      }
    });

    let plan=response.data.choices[0].message.content;
    document.getElementById("result").innerText=plan;

  }catch(err){
    document.getElementById("result").innerText="حدث خطأ في توليد الخطة.";
    console.error(err);
  }
}
</script>

</body>
</html>
