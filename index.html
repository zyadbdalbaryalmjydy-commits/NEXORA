<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora 🚀</title>

<style>

body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.container {
  padding:20px;
}

.card {
  background:white;
  color:black;
  padding:20px;
  margin:20px auto;
  border-radius:15px;
  max-width:350px;
}

input {
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#007BFF;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#0056b3;
}

.logo {
  font-size:28px;
  font-weight:bold;
  margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
🚀 Nexora
</div>

<!-- صفحة تسجيل الدخول -->

<div id="auth" class="card">

<h2>إنشاء حساب / تسجيل دخول</h2>

<input id="email" type="email" placeholder="البريد الإلكتروني">

<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="signup()">
إنشاء حساب
</button>

<button onclick="login()">
تسجيل دخول
</button>

</div>

<!-- التطبيق بعد تسجيل الدخول -->

<div id="app" style="display:none;">

<h2>
مرحبًا 👋
</h2>

<p id="userEmail"></p>

<div class="card">

<h3>🔥 أدوات Nexora</h3>

<button onclick="generatePlan()">
📊 توليد خطة مشروع
</button>

<button onclick="generateLogo()">
🎨 توليد شعار
</button>

<button onclick="generateVoice()">
🎤 توليد صوت
</button>

</div>

<div class="card">

<h3>🚀 اشتراكك</h3>

<p>
🔥 Nexora Pro (مجاني مؤقت)
</p>

</div>

<button onclick="logout()">
🚪 تسجيل خروج
</button>

</div>

</div>

<!-- Firebase CDN -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

// Firebase Config (بياناتك)

const firebaseConfig = {
  apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",
  authDomain: "nexora-1c66b.firebaseapp.com",
  projectId: "nexora-1c66b",
  storageBucket: "nexora-1c66b.firebasestorage.app",
  messagingSenderId: "964700323381",
  appId: "1:964700323381:web:5826dd261cb062f401fb7c",
  measurementId: "G-HVC60XSN6D"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();


// إنشاء حساب

function signup(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,password)

.then(()=>{

alert("تم إنشاء الحساب بنجاح 🚀");

})

.catch((error)=>{

alert(error.message);

});

}


// تسجيل دخول

function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)

.then(()=>{

alert("تم تسجيل الدخول ✅");

})

.catch((error)=>{

alert(error.message);

});

}


// تسجيل خروج

function logout(){

auth.signOut();

}


// مراقبة تسجيل الدخول

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("userEmail").innerText=user.email;

}

else{

document.getElementById("auth").style.display="block";
document.getElementById("app").style.display="none";

}

});



// أدوات Nexora (مؤقتة)

function generatePlan(){

alert("📊 سيتم توليد خطة مشروع قريبًا");

}

function generateLogo(){

alert("🎨 سيتم توليد شعار قريبًا");

}

function generateVoice(){

alert("🎤 سيتم توليد صوت قريبًا");

}

</script>

</body>
</html>
