<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>Nexora | تسجيل الدخول</title>

<style>

body {

font-family: Arial;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.box {

background:#111827;

padding:30px;

border-radius:15px;

width:300px;

text-align:center;

}

input {

width:100%;

padding:10px;

margin:10px 0;

border-radius:8px;

border:none;

}

button {

width:100%;

padding:10px;

background:#22c55e;

border:none;

border-radius:8px;

color:white;

font-size:16px;

cursor:pointer;

}

button:hover {

background:#16a34a;

}

</style>

</head>

<body>

<div class="box">

<h2>Nexora</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">

دخول

</button>

<br><br>

<button onclick="register()">

إنشاء حساب

</button>

</div>

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword,

createUserWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",

authDomain: "nexora-1c66b.firebaseapp.com",

databaseURL: "https://nexora-1c66b-default-rtdb.firebaseio.com",

projectId: "nexora-1c66b",

storageBucket: "nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId: "1:964700323381:web:5826dd261cb062f401fb7c",

measurementId: "G-HVC60XSN6D"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function() {

const email =

document.getElementById("email").value;

const password =

document.getElementById("password").value;

try {

await signInWithEmailAndPassword(

auth,

email,

password

);

window.location.href =

"dashboard.html";

}

catch {

alert("خطأ في تسجيل الدخول");

}

};

window.register = async function() {

const email =

document.getElementById("email").value;

const password =

document.getElementById("password").value;

try {

await createUserWithEmailAndPassword(

auth,

email,

password

);

alert("تم إنشاء الحساب");

}

catch {

alert("خطأ في التسجيل");

}

};

</script>

</body>

</html>
