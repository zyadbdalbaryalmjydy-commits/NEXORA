<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexora</title>

<style>

body {

font-family: Arial;
direction: rtl;

background: #0f172a;
color: white;

display: flex;
justify-content: center;
align-items: center;

height: 100vh;
margin: 0;

}

.container {

background: #1e293b;

padding: 25px;

border-radius: 15px;

width: 300px;

text-align: center;

}

input {

width: 100%;

padding: 10px;

margin-top: 10px;

border-radius: 10px;

border: none;

}

button {

width: 100%;

padding: 10px;

margin-top: 10px;

border-radius: 10px;

border: none;

cursor: pointer;

background: #22c55e;

color: white;

font-size: 15px;

}

h1 {

margin-bottom: 20px;

}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Nexora</h1>

<input
type="email"
id="email"
placeholder="البريد الإلكتروني"
/>

<input
type="password"
id="password"
placeholder="كلمة المرور"
/>

<button onclick="register()">
🆕 إنشاء حساب
</button>

<button onclick="login()">
🔐 تسجيل دخول
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// Firebase config

const firebaseConfig = {

apiKey: "AIzaSyBYEIxaoS1RbUCxqgj5g5rbpKZe1ddd80o",

authDomain: "nexora-1c66b.firebaseapp.com",

projectId: "nexora-1c66b",

storageBucket:
"nexora-1c66b.firebasestorage.app",

messagingSenderId: "964700323381",

appId:
"1:964700323381:web:5826dd261cb062f401fb7c"

};


// Initialize Firebase

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);


// تسجيل حساب

window.register =
async function () {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("✅ تم إنشاء الحساب");

window.location.href =
"dashboard.html";

}

catch (error) {

alert(error.message);

}

};


// تسجيل دخول

window.login =
async function () {

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("✅ تم تسجيل الدخول");

window.location.href =
"dashboard.html";

}

catch (error) {

alert(error.message);

}

};


// إذا المستخدم مسجل بالفعل

onAuthStateChanged(
auth,
(user) => {

if (user) {

window.location.href =
"dashboard.html";

}

}
);

</script>

</body>

</html>
