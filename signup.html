<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexora Sign Up</title>
<style>
body {
    background: linear-gradient(to bottom, #0b3d91, #ffffff);
    color: #0b0f2b;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
}

input, textarea {
    padding: 12px;
    margin: 10px;
    width: 250px;
    border-radius: 6px;
    border: 1px solid #0b3d91;
    background-color: #e6e6ff;
    color: #0b0f2b;
}

button {
    background-color: #0b3d91;
    color: white;
    border: none;
    padding: 12px 25px;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>
<body>

<h1>Create Your Nexora Account</h1>

<input type="text" placeholder="Name"><br>
<input type="email" placeholder="Email"><br>
<input type="password" placeholder="Password"><br>

<button onclick="window.location.href='builder.html'">Create Account</button>

</body>
</html>
