<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding-top:100px;">

<h1>Signup</h1>

<input id="email" placeholder="Email"><br><br>
<input id="pass" placeholder="Password"><br><br>

<button onclick="signup()">Create Account</button>

<script>

// 🔥 حط بيانات Firebase هنا
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);

function signup(){
firebase.auth().createUserWithEmailAndPassword(email.value, pass.value)
.then(()=>{
alert("Account created");
window.location.href="dashboard.html";
})
.catch(e=>alert(e.message));
}

</script>

</body>
</html>
